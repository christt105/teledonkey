services:
  teledonkey:
    image: christt105/teledonkey:latest
    container_name: teledonkey
    restart: unless-stopped
    env_file:
      - .env
    # Image is built and published to Docker Hub by GitHub Actions on each
    # commit. To update: `docker compose pull && docker compose up -d`.
    # (To build locally instead, run `docker build -t christt105/teledonkey .`.)
